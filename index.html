<body>

  <!-- Add your site or application content here -->
  <h1>JEOPARDY</h1>

  <div class="scoreboard">
    <div>Team 1: <span id="score1">0</span></div>
    <div>Team 2: <span id="score2">0</span></div>
  </div>

  <div id="board" class="board"></div>

  <!-- Frage Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="questionText"></h2>
      <p id="answerText" class="hidden"></p>

      <div class="buttons">
        <button onclick="showAnswer()">Antwort zeigen</button>
        <button onclick="addPoints(1)">Team 1 richtig</button>
        <button onclick="addPoints(2)">Team 2 richtig</button>
        <button onclick="closeModal()">Schließen</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
