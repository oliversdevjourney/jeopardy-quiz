<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jeopardy Control Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>CONTROL PANEL</h1>

<div class="scoreboard">
  <div>Team 1: <span id="score1">0</span></div>
  <div>Team 2: <span id="score2">0</span></div>
</div>

<div id="board" class="board"></div>

<!-- Modal mit Antwort + Buttons -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <div class="category" id="modalCategory"></div>
    <div class="points" id="modalPoints"></div>
    <div id="questionText" class="question"></div>
    <div id="answerText" class="points"></div>
    <div>
      <button onclick="addPoints(1)">Richtig Team 1</button>
      <button onclick="addPoints(2)">Richtig Team 2</button>
      <button onclick="closeModal()">Schließen</button>
    </div>
  </div>
</div>

<script src="js/control.js"></script>
</body>
</html>
